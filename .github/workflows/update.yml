
name: Update Profile

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm run build

      - name: Commit changes when the generated assets changed
        run: |
          if git diff --quiet -- assets/avatar.txt assets/dark_mode.svg assets/light_mode.svg; then
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add assets/avatar.txt assets/dark_mode.svg assets/light_mode.svg
          git commit -m "Update profile assets"
          git push
