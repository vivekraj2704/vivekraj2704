<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">GitHub Profile Banner</title>
  <desc id="desc">A split SVG profile banner with a large ASCII portrait and compact info cards.</desc>
  <defs>
    <clipPath id="panel-clip">
      <rect x="20" y="20" width="960" height="640" rx="28" ry="28" />
    </clipPath>
    <style>
      .canvas { fill: #0D1117; }
      .shell { fill: #0D1117; stroke: #30363D; stroke-width: 1.4; }
      .panel { fill: #161B22; stroke: #30363D; stroke-width: 1.1; }
      .soft-panel { fill: #0F1520; stroke: #30363D; stroke-width: 1; }
      .accent-rule { stroke: #FFA657; stroke-width: 2.25; }
      .rule { stroke: #30363D; stroke-width: 1; opacity: 0.8; }
      @font-face {
          src: local('Consolas'), local('Consolas Bold');
          font-family: 'ConsolasFallback';
          font-display: swap;
          -webkit-size-adjust: 109%;
          size-adjust: 109%;
      }
      .mono {
          font-family: 'Consolas', monospace;
      }
      .portrait { fill: #C9D1D9; font-size: 7px; letter-spacing: 0.5px; }
      .headline { fill: #C9D1D9; font-size: 23px; font-weight: 700; }
      .subhead { fill: #8B949E; font-size: 11px; }
      .title { fill: #C9D1D9; font-size: 15px; font-weight: 700; }
      .label { fill: #FFA657; font-size: 10px; font-weight: 700; letter-spacing: 0.9px; }
      .body { fill: #C9D1D9; font-size: 11.5px; }
      .body-dim { fill: #8B949E; font-size: 10.5px; }
      .prompt { fill: #7EE787; }
      .command { fill: #79C0FF; }
      .accent { fill: #FFA657; }
      .cursor { fill: #58A6FF; }
      .fade-in { animation: fadeIn 0.65s ease-out both; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </defs>
