<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">GitHub Profile Banner</title>
  <desc id="desc">A split SVG profile banner with a large ASCII portrait and compact info cards.</desc>
  <defs>
    <clipPath id="panel-clip">
      <rect x="20" y="20" width="960" height="640" rx="28" ry="28" />
    </clipPath>
    <style>
      .canvas { fill: #F6F8FA; }
      .shell { fill: #F6F8FA; stroke: #D0D7DE; stroke-width: 1.4; }
      .panel { fill: #FFFFFF; stroke: #D0D7DE; stroke-width: 1.1; }
      .soft-panel { fill: #F3F6FA; stroke: #D0D7DE; stroke-width: 1; }
      .accent-rule { stroke: #953800; stroke-width: 2.25; }
      .rule { stroke: #D0D7DE; stroke-width: 1; opacity: 0.8; }
      .mono { font-family: 'JetBrains Mono', Consolas, monospace; }
      .portrait { fill: #24292F; font-size: 6.2px; letter-spacing: 0; }
      .headline { fill: #24292F; font-size: 23px; font-weight: 700; }
      .subhead { fill: #57606A; font-size: 11px; }
      .title { fill: #24292F; font-size: 15px; font-weight: 700; }
      .label { fill: #953800; font-size: 10px; font-weight: 700; letter-spacing: 0.9px; }
      .body { fill: #24292F; font-size: 11.5px; }
      .body-dim { fill: #57606A; font-size: 10.5px; }
      .prompt { fill: #1A7F37; }
      .command { fill: #0969DA; }
      .accent { fill: #953800; }
      .cursor { fill: #0969DA; }
      .fade-in { animation: fadeIn 0.65s ease-out both; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </defs>
  <rect class="canvas" width="1000" height="680" rx="30" ry="30" />
  <rect class="shell" x="20" y="20" width="960" height="640" rx="28" ry="28" />
  <g clip-path="url(#panel-clip)">
    
    <g class="mono fade-in">
      
